<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
:root {
    --widget-bg: rgba(255,255,255,0.92);
    --inactive-bg: #f1f1ef;
    --active-bg: #000000;
    --active-text: #ffffff;
    --inactive-text: #787774;
    --date-text: #787774;
    --time-text: #000000;
    --countdown-text: #2f6df6;
    --no-countdown-bg: #787774;
    --no-countdown-text: #ffffff;
    --card-fg: #1a1a1a;
    --card-fg-dim: #787774;
    --font-scale: 1;
}
body {
    font-family: var(--font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", Roboto, sans-serif);
    background: transparent;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    zoom: var(--font-scale);
}
.widget-container {
    width: 100%;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: center;
}
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: -6px;
    -webkit-app-region: drag;
}
.icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    -webkit-app-region: no-drag;
    border-radius: 6px;
    opacity: 0.35;
    transition: opacity 0.2s, background 0.2s;
    line-height: 1;
    color: var(--card-fg);
}
.icon-btn:hover { opacity: 0.7; background: var(--inactive-bg); }
.icon-btn.pinned { opacity: 1; }
.window-btn { font-size: 0.78rem; padding: 1px 6px; }
.minimize-btn:hover { background: #ffe066 !important; color: #7a5c00 !important; opacity: 1 !important; }
.close-btn:hover { background: #ffe0e0 !important; color: #d00 !important; opacity: 1 !important; }
body.preview-mode .date-label { color: #e06000; font-weight: 600; }
body.bold-mode .period-name,
body.bold-mode .date-label,
body.bold-mode .current-period,
body.bold-mode .next-timer,
body.bold-mode .time-label { font-weight: 700; }
.clock-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
}
.date-label { font-size: 0.8rem; color: var(--card-fg-dim); }
.time-display { font-size: 2rem; font-weight: 700; color: var(--card-fg); }
.current-period { font-size: 0.9rem; color: var(--card-fg-dim); }
.next-timer { font-size: 0.9rem; font-weight: 600; color: var(--countdown-text); margin-top: 2px; }
.timetable-container { display: flex; flex-direction: column; gap: 8px; }
.period-block {
    position: relative;
    overflow: hidden;
    padding: 0;
    border-radius: 8px;
    background-color: var(--inactive-bg);
    color: var(--inactive-text);
}
.period-block.active { transform: scale(1.02); }
.progress-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background-color: var(--active-bg); z-index: 0;
    transition: width 0.8s ease;
}
.period-block.no-countdown .progress-fill { background-color: var(--no-countdown-bg); }
.period-block.no-countdown .period-text-fill-inner { color: var(--no-countdown-text); }
.period-content { position: relative; z-index: 1; width: 100%; min-height: 100%; }
.period-text-base, .period-text-fill-inner {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; padding: 12px 15px; box-sizing: border-box; width: 100%;
}
.period-text-base { color: var(--inactive-text); }
.period-text-fill {
    position: absolute; inset: 0; color: var(--active-text);
    overflow: hidden; white-space: nowrap; pointer-events: none; z-index: 2;
}
.period-text-fill-inner { color: var(--active-text); height: 100%; }
.period-name { text-align: left; font-weight: 500; line-height: 1.25; flex: 1; min-width: 0; }
.period-name .sub-label { font-size: 0.8em; opacity: 0.85; white-space: nowrap; }
.period-name .personal-label { display: block; font-size: 0.78em; opacity: 0.9; margin-top: 2px; font-weight: 400; }
.time-label { font-size: 0.75rem; opacity: 0.8; flex-shrink: 0; text-align: right; }
.mini-time {
    display: none;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--card-fg);
}
body.mini { padding: 6px 10px; }
body.mini .mini-time { display: inline-block; }
body.mini .clock-container { display: none; }
body.mini .widget-container { max-width: none; gap: 8px; }
body.mini .period-block { display: none; }
body.mini .period-block.active,
body.mini .period-block.mini-inactive-block { display: block; }
body.mini .period-block.no-countdown { display: none; }
body.mini .period-text-base,
body.mini .period-text-fill-inner { padding: 8px 12px; }
body.mini #miniBtn { opacity: 0.65; }
body.mini .opacity-row { display: none; }
body.has-bg .widget-container {
    background: var(--widget-bg);
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}
body.mini.has-bg .widget-container { border-radius: 12px; padding: 6px 8px; }
.opacity-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 2px 0;
    opacity: 0.3;
    transition: opacity 0.2s;
}
.opacity-row:hover { opacity: 1; }
.opacity-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--inactive-bg);
    outline: none;
    cursor: pointer;
}
.opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--inactive-text);
    cursor: pointer;
    transition: background 0.15s;
}
.opacity-slider:hover::-webkit-slider-thumb { background: var(--time-text); }
.opacity-icon { font-size: 0.75rem; color: var(--inactive-text); flex-shrink: 0; }
.mini-timer {
    display: none;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--countdown-text);
    text-align: center;
}
body.mini .mini-timer { display: block; }
@media (prefers-color-scheme: dark) {
:root {
    --widget-bg: rgba(30,30,30,0.92);
    --inactive-bg: #2f2f2f; --inactive-text: #9b9b9b;
    --date-text: #9b9b9b; --time-text: #ffffff; --countdown-text: #6ea8ff;
    --no-countdown-bg: #787774;
    --card-fg: #ffffff; --card-fg-dim: #9b9b9b;
}
}
.resize-handle {
    position: fixed;
    z-index: 9999;
    -webkit-app-region: no-drag;
}
.resize-handle.top    { top: 0; left: 6px; right: 6px; height: 5px; cursor: n-resize; }
.resize-handle.bottom { bottom: 0; left: 6px; right: 6px; height: 5px; cursor: s-resize; }
.resize-handle.left   { left: 0; top: 6px; bottom: 6px; width: 5px; cursor: w-resize; }
.resize-handle.right  { right: 0; top: 6px; bottom: 6px; width: 5px; cursor: e-resize; }
.resize-handle.top-left     { top: 0; left: 0; width: 10px; height: 10px; cursor: nw-resize; }
.resize-handle.top-right    { top: 0; right: 0; width: 10px; height: 10px; cursor: ne-resize; }
.resize-handle.bottom-left  { bottom: 0; left: 0; width: 10px; height: 10px; cursor: sw-resize; }
.resize-handle.bottom-right { bottom: 0; right: 0; width: 10px; height: 10px; cursor: se-resize; }
</style>
</head>
<body>
<div class="widget-container">
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:4px;">
            <button class="icon-btn window-btn close-btn" id="closeBtn" title="종료" onclick="closeApp()">✕</button>
            <button class="icon-btn window-btn minimize-btn" id="minimizeBtn" title="최소화" onclick="minimizeWindow()">−</button>
            <button class="icon-btn" id="pinBtn" title="항상 위 고정" onclick="togglePin()">📌</button>
        </div>
        <div style="display:flex;align-items:center;gap:4px;">
            <button class="icon-btn" id="bgBtn" title="배경 켜기/끄기" onclick="toggleBackground()">▣</button>
            <button class="icon-btn" id="miniBtn" title="미니 모드 전환" onclick="toggleMiniMode()">⊟</button>
            <button class="icon-btn" id="settingsBtn" title="시정 설정" onclick="openSettings()">⚙️</button>
            <span class="mini-time" id="miniTime"></span>
        </div>
    </div>
    <div class="clock-container">
        <div class="date-label" id="dateLabel"></div>
        <div class="time-display" id="timeDisplay"></div>
        <div class="current-period" id="currentPeriod"></div>
        <div class="next-timer" id="nextTimer"></div>
    </div>
    <div class="timetable-container" id="timetable"></div>
    <div class="mini-timer" id="miniTimer"></div>
    <div class="opacity-row">
        <span class="opacity-icon">◑</span>
        <input type="range" class="opacity-slider" id="opacitySlider"
            min="10" max="100" value="100"
            oninput="applyOpacity(this.value)"
            onchange="saveOpacity(this.value)">
    </div>
</div>

<script>
const weekNames = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
let scheduleData = null;
let isMiniMode = false;
let isPinned = false;
let previewOffset = null;
let _fastRenderUntil = 0;

function formatCountdown(leftMs, prefix, alwaysMs = false) {
    if (alwaysMs && leftMs > 0) {
        _fastRenderUntil = Math.max(_fastRenderUntil, Date.now() + leftMs + 200);
        const totalSec = Math.floor(leftMs / 1000);
        const m = Math.floor(totalSec / 60), s = totalSec % 60;
        const cs = Math.floor((leftMs % 1000) / 10);
        return `${prefix} ${m}분 ${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}초`;
    }
    if (leftMs > 0 && leftMs <= 5000) {
        _fastRenderUntil = Math.max(_fastRenderUntil, Date.now() + leftMs + 200);
        const s = Math.floor(leftMs / 1000);
        const cs = Math.floor((leftMs % 1000) / 10);
        return `${prefix} ${s}.${String(cs).padStart(2, '0')}초`;
    }
    const totalSec = Math.floor(leftMs / 1000);
    const m = Math.floor(totalSec / 60), s = totalSec % 60;
    return `${prefix} ${m}분 ${String(s).padStart(2, '0')}초`;
}

async function loadSchedule() {
    scheduleData = await window.pywebview.api.get_schedule();
}

function applyThemeBgColor(color) {
    document.documentElement.style.setProperty('--widget-bg', color || 'rgba(255,255,255,0.92)');
    if (color && /^#[0-9a-fA-F]{6}$/.test(color)) {
        const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
        const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
        const dark = lum < 0.5;
        document.documentElement.style.setProperty('--card-fg', dark ? '#ffffff' : '#1a1a1a');
        document.documentElement.style.setProperty('--card-fg-dim', dark ? 'rgba(255,255,255,0.55)' : '#787774');
    } else {
        document.documentElement.style.removeProperty('--card-fg');
        document.documentElement.style.removeProperty('--card-fg-dim');
    }
}

function applyThemeColor(color) {
    document.documentElement.style.setProperty('--active-bg', color);
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
    document.documentElement.style.setProperty('--active-text', lum > 0.55 ? '#000000' : '#ffffff');
}

function applyThemeInactiveColor(color) {
    document.documentElement.style.setProperty('--inactive-bg', color);
}

function applyThemeCountdownColor(color) {
    document.documentElement.style.setProperty('--countdown-text', color);
}

function applyThemeNoCountdownColor(color) {
    document.documentElement.style.setProperty('--no-countdown-bg', color);
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
    document.documentElement.style.setProperty('--no-countdown-text', lum > 0.55 ? '#000000' : '#ffffff');
}

function applyThemeColorByKey(key, color) {
    if (key === 'bg') applyThemeBgColor(color);
    else if (key === 'active') applyThemeColor(color);
    else if (key === 'inactive') applyThemeInactiveColor(color);
    else if (key === 'countdown') applyThemeCountdownColor(color);
    else if (key === 'no_countdown') applyThemeNoCountdownColor(color);
}

function applyThemeFont(font) {
    const stack = font
        ? `"${font}", -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif`
        : '-apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", Roboto, sans-serif';
    document.documentElement.style.setProperty('--font-family', stack);
}

function applyThemeBold(bold) {
    document.body.classList.toggle('bold-mode', !!bold);
}

function applyFontScale(scale) {
    document.documentElement.style.setProperty('--font-scale', scale);
}

function applyShowMs(val) {
    if (scheduleData) scheduleData.show_ms = val;
}

function applyTheme() {
    applyThemeBgColor(scheduleData.bg_color || '');
    applyThemeColor(scheduleData.active_color || '#000000');
    applyThemeInactiveColor(scheduleData.inactive_color || '#f1f1ef');
    applyThemeCountdownColor(scheduleData.countdown_color || '#2f6df6');
    if (scheduleData.no_countdown_color) applyThemeNoCountdownColor(scheduleData.no_countdown_color);
    applyThemeFont(scheduleData.font_family || '');
    applyThemeBold(scheduleData.font_bold || false);
    applyFontScale(scheduleData.font_scale || 1);
}

async function reloadSchedule() {
    await loadSchedule();
    buildTopBar();
    const savedOpacity = scheduleData.opacity ?? 100;
    document.getElementById('opacitySlider').value = savedOpacity;
    applyOpacity(savedOpacity);
    applyTheme();
}

function setPreviewOffset(seconds) {
    previewOffset = seconds;
    document.body.classList.add('preview-mode');
}

function clearPreviewOffset() {
    previewOffset = null;
    document.body.classList.remove('preview-mode');
}

function getTopBarStyle() {
    const saved = scheduleData && scheduleData.top_bar_style;
    if (saved === 'mac' || saved === 'windows') return saved;
    return navigator.platform.startsWith('Mac') ? 'mac' : 'windows';
}

function buildTopBar() {
    const style = getTopBarStyle();
    const topBar = document.querySelector('.top-bar');
    const miniIcon = isMiniMode ? '⊞' : '⊟';
    const pinClass = isPinned ? ' pinned' : '';
    const bgClass = (scheduleData && scheduleData.has_bg) ? ' pinned' : '';

    if (style === 'windows') {
        topBar.innerHTML = `
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="icon-btn" id="settingsBtn" title="시정 설정" onclick="openSettings()">⚙️</button>
                <button class="icon-btn${bgClass}" id="bgBtn" title="배경 켜기/끄기" onclick="toggleBackground()">▣</button>
                <button class="icon-btn" id="miniBtn" title="미니 모드 전환" onclick="toggleMiniMode()">${miniIcon}</button>
                <span class="mini-time" id="miniTime"></span>
            </div>
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="icon-btn${pinClass}" id="pinBtn" title="항상 위 고정" onclick="togglePin()">📌</button>
                <button class="icon-btn window-btn minimize-btn" id="minimizeBtn" title="최소화" onclick="minimizeWindow()">−</button>
                <button class="icon-btn window-btn close-btn" id="closeBtn" title="종료" onclick="closeApp()">✕</button>
            </div>`;
    } else {
        topBar.innerHTML = `
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="icon-btn window-btn close-btn" id="closeBtn" title="종료" onclick="closeApp()">✕</button>
                <button class="icon-btn window-btn minimize-btn" id="minimizeBtn" title="최소화" onclick="minimizeWindow()">−</button>
                <button class="icon-btn${pinClass}" id="pinBtn" title="항상 위 고정" onclick="togglePin()">📌</button>
            </div>
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="icon-btn${bgClass}" id="bgBtn" title="배경 켜기/끄기" onclick="toggleBackground()">▣</button>
                <button class="icon-btn" id="miniBtn" title="미니 모드 전환" onclick="toggleMiniMode()">${miniIcon}</button>
                <button class="icon-btn" id="settingsBtn" title="시정 설정" onclick="openSettings()">⚙️</button>
                <span class="mini-time" id="miniTime"></span>
            </div>`;
    }
}

function openSettings() {
    window.pywebview.api.open_settings();
}

function togglePin() {
    isPinned = !isPinned;
    document.getElementById("pinBtn").classList.toggle("pinned", isPinned);
    window.pywebview.api.toggle_on_top(isPinned);
}

function minimizeWindow() {
    window.pywebview.api.minimize_window();
}

function closeApp() {
    window.pywebview.api.close_app();
}

function applyOpacity(val) {
    document.querySelector('.widget-container').style.opacity = val / 100;
}

function saveOpacity(val) {
    scheduleData.opacity = parseInt(val);
    window.pywebview.api.save_schedule(scheduleData);
}

function toggleBackground() {
    const hasBg = document.body.classList.toggle('has-bg');
    document.getElementById('bgBtn').classList.toggle('pinned', hasBg);
    scheduleData.has_bg = hasBg;
    window.pywebview.api.save_schedule(scheduleData);
}

function toggleMiniMode() {
    isMiniMode = !isMiniMode;
    document.body.classList.toggle('mini', isMiniMode);
    document.getElementById('miniBtn').textContent = isMiniMode ? '⊞' : '⊟';
    window.pywebview.api.set_mini_mode(isMiniMode);
}

function getTodaySchedule(dayIndex) {
    if (!scheduleData) return [];
    const restDays = scheduleData.rest_days ?? [0, 6];
    if (restDays.includes(dayIndex)) {
        return (scheduleData.rest_schedules && scheduleData.rest_schedules[String(dayIndex)]) || [];
    }
    const shortDays = scheduleData.short_days || [3, 5];
    return shortDays.includes(dayIndex) ? scheduleData.short : scheduleData.full;
}

function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth()+1).padStart(2,"0");
    const d = String(date.getDate()).padStart(2,"0");
    const w = weekNames[date.getDay()];
    return `${y}.${m}.${d}. (${w})`;
}

function formatTime(date) {
    return `${String(date.getHours()).padStart(2,"0")}:${String(date.getMinutes()).padStart(2,"0")}`;
}

function formatPeriodName(name) {
    return name.replace(/\(([^)]+)\)/g, '<span class="sub-label">($1)</span>');
}

function toMinutes(t) {
    const [h,m] = t.split(":").map(Number);
    return h*60+m;
}

function getNextSchoolDay(now) {
    for (let i = 1; i <= 7; i++) {
        const d = new Date(now);
        d.setDate(now.getDate() + i);
        d.setHours(8, 20, 0, 0);
        if (getTodaySchedule(d.getDay()).length > 0) return d;
    }
    const d = new Date(now);
    d.setDate(now.getDate() + 7);
    d.setHours(8, 20, 0, 0);
    return d;
}

function addMiniInactiveBlock(container, name) {
    const block = document.createElement('div');
    block.className = 'period-block mini-inactive-block';
    block.innerHTML = `
        <div class="period-content">
            <div class="period-text-base">
                <span class="period-name">${name}</span>
            </div>
        </div>`;
    container.appendChild(block);
}

function isItemActive(sMin, eMin, currentMinutes) {
    if (eMin <= sMin) return currentMinutes >= sMin; // 자정 넘김은 overflow 시스템이 처리
    return currentMinutes >= sMin && currentMinutes < eMin;
}

function getItemProgress(sMin, eMin, currentMinutes, currentSeconds) {
    const crossMid = eMin <= sMin;
    const totalSec = (crossMid ? 1440 - sMin + eMin : eMin - sMin) * 60;
    const elapsedSec = crossMid && currentMinutes < eMin
        ? (1440 - sMin) * 60 + currentSeconds
        : currentSeconds - sMin * 60;
    return Math.max(0, Math.min(100, (elapsedSec / totalSec) * 100));
}

function getYesterdayOverflowItem(dayIndex, currentMinutes) {
    const prevDay = (dayIndex + 6) % 7;
    const prevSchedule = getTodaySchedule(prevDay);
    for (let i = prevSchedule.length - 1; i >= 0; i--) {
        const item = prevSchedule[i];
        const sMin = toMinutes(item.start), eMin = toMinutes(item.end);
        if (eMin <= sMin && currentMinutes < eMin) return item;
    }
    return null;
}

function blendColors(hex1, hex2, ratio) {
    const r1=parseInt(hex1.slice(1,3),16), g1=parseInt(hex1.slice(3,5),16), b1=parseInt(hex1.slice(5,7),16);
    const r2=parseInt(hex2.slice(1,3),16), g2=parseInt(hex2.slice(3,5),16), b2=parseInt(hex2.slice(5,7),16);
    const r=Math.round(r1+(r2-r1)*ratio), g=Math.round(g1+(g2-g1)*ratio), b=Math.round(b1+(b2-b1)*ratio);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function render() {
    if (!scheduleData) { setTimeout(render, 200); return; }

    const container = document.getElementById("timetable");
    const offsetMs = (previewOffset !== null ? previewOffset : (scheduleData.time_offset_seconds || 0)) * 1000;
    const now = new Date(Date.now() + offsetMs);
    const currentTime = formatTime(now);
    const currentMinutes = now.getHours()*60+now.getMinutes();
    const currentSeconds = now.getHours()*3600+now.getMinutes()*60+now.getSeconds();
    const currentMs = now.getHours()*3600000 + now.getMinutes()*60000 + now.getSeconds()*1000 + now.getMilliseconds();
    const todaySchedule = getTodaySchedule(now.getDay());

    const alwaysMs = scheduleData.show_ms !== false;
    const endText = scheduleData.end_text || "˚˖𓍢ִִ໋˚˖𓍢ִ✧˚.오늘 일정 종료˚˖𓍢ִִ໋˚˖𓍢ִ✧˚.";
    const restStatusText = scheduleData.rest_status_text || "학교 생각을 왜 하지";
    const restTimerPrefix = scheduleData.rest_timer_prefix || "월요일 출근까지";

    document.getElementById("dateLabel").textContent = formatDate(now);
    document.getElementById("timeDisplay").textContent = currentTime;
    document.getElementById("miniTime").textContent = currentTime;
    container.innerHTML = "";

    const restDays = scheduleData.rest_days ?? [0, 6];
    const isRestDay = restDays.includes(now.getDay());
    const overflowItem = getYesterdayOverflowItem(now.getDay(), currentMinutes);

    if (isRestDay && todaySchedule.length === 0 && !overflowItem) {
        const nextSchoolDate = getNextSchoolDay(now);
        const nextDayName = weekNames[nextSchoolDate.getDay()];
        const diff = nextSchoolDate - now;
        const totalSec = Math.floor(diff/1000);
        const dS=Math.floor(totalSec/86400), hS=Math.floor((totalSec%86400)/3600), mS=Math.floor((totalSec%3600)/60), sS=totalSec%60;
        const timerPrefix = `${nextDayName} ${restTimerPrefix}`;
        let t = timerPrefix + " ";
        if(dS>0) t+=`${dS}일 `;
        if(hS>0||dS>0) t+=`${hS}시간 `;
        t+=`${mS}분 ${String(sS).padStart(2,"0")}초 남음`;
        document.getElementById("currentPeriod").textContent = restStatusText;
        document.getElementById("nextTimer").textContent = t;
        let mt = timerPrefix + " ";
        if(dS>0) mt+=`${dS}일 `;
        if(hS>0||dS>0) mt+=`${hS}시간 `;
        mt+=`${mS}분 ${String(sS).padStart(2,"0")}초`;
        document.getElementById("miniTimer").textContent = mt;
        if (isMiniMode) addMiniInactiveBlock(container, "쉬는 날 ✨");
        return;
    }

    let activeName = (currentTime<"08:20"||currentTime>="16:20") ? "영업시간 아님" : "쉬는 시간";
    let activeScheduleItem = null;
    let miniActiveItem = null;

    if (overflowItem && todaySchedule.length === 0) {
        const sMin = toMinutes(overflowItem.start), eMin = toMinutes(overflowItem.end);
        const pct = getItemProgress(sMin, eMin, currentMinutes, currentSeconds);
        const block = document.createElement("div");
        block.className = "period-block active";
        const fillHtml = `<div class="period-text-fill" style="clip-path:inset(0 ${100-pct}% 0 0);">
            <div class="period-text-fill-inner">
                <span class="period-name">${formatPeriodName(overflowItem.name)}</span>
                <span class="time-label">${overflowItem.start} - ${overflowItem.end}</span>
            </div></div>`;
        block.innerHTML = `<div class="progress-fill" style="width:${pct}%;"></div>
            <div class="period-content">
                <div class="period-text-base">
                    <span class="period-name">${formatPeriodName(overflowItem.name)}</span>
                    <span class="time-label">${overflowItem.start} - ${overflowItem.end}</span>
                </div>${fillHtml}</div>`;
        container.appendChild(block);
        activeName = overflowItem.name;
        activeScheduleItem = overflowItem;
        if (!overflowItem.no_countdown) miniActiveItem = overflowItem;
    }

    const personalSchedule = (scheduleData.personal && scheduleData.personal[String(now.getDay())]) || [];
    let activePersonal = null;

    todaySchedule.forEach((item, i) => {
        const block = document.createElement("div");
        const isNoCountdown = !!item.no_countdown;
        block.className = "period-block" + (isNoCountdown ? " no-countdown" : "");
        const sMin=toMinutes(item.start), eMin=toMinutes(item.end);
        let progressHTML="", fillTextHTML="", pct=0;

        // 개인 시간표: 항상 표시
        let personalLabel = '';
        const personalEntry = personalSchedule[i];
        if (personalEntry) {
            const parts = [personalEntry.room, personalEntry.name].filter(Boolean).join(' ');
            if (parts) personalLabel = `<span class="personal-label">${parts}</span>`;
        }

        if (isItemActive(sMin, eMin, currentMinutes)) {
            block.classList.add("active");
            activeScheduleItem = item;
            if (!isNoCountdown) {
                activeName = item.name;
                miniActiveItem = item;
                if (personalEntry) activePersonal = personalEntry;
            }
            pct = getItemProgress(sMin, eMin, currentMinutes, currentSeconds);

            // 컬러 카운트다운: 개인 수업이 있고 종료 5초 이내일 때 진행바 색상 점진적 변화
            let bellFillStyle = '', bellTextStyle = '';
            if (scheduleData.bell_alert_enabled && personalEntry) {
                const crossMid = eMin <= sMin;
                let endSec = eMin * 60;
                if (crossMid && currentSeconds > endSec) endSec += 86400;
                const remaining = endSec - currentSeconds;
                const alertSec = scheduleData.bell_alert_seconds || 5;
                if (remaining >= 0 && remaining <= alertSec) {
                    const ratio = (alertSec - remaining) / alertSec;
                    const alertColor = scheduleData.bell_alert_color || '#ff3b30';
                    const baseColor = isNoCountdown
                        ? (scheduleData.no_countdown_color || '#787774')
                        : (scheduleData.active_color || '#000000');
                    const blended = blendColors(baseColor, alertColor, ratio);
                    const r=parseInt(blended.slice(1,3),16), g=parseInt(blended.slice(3,5),16), b=parseInt(blended.slice(5,7),16);
                    const textColor = (0.299*r+0.587*g+0.114*b)/255 > 0.55 ? '#000000' : '#ffffff';
                    bellFillStyle = `background-color:${blended};`;
                    bellTextStyle = ` style="color:${textColor};"`;
                }
            }

            progressHTML=`<div class="progress-fill" style="width:${pct}%;${bellFillStyle}"></div>`;
            fillTextHTML=`
                <div class="period-text-fill" style="clip-path:inset(0 ${100-pct}% 0 0);">
                    <div class="period-text-fill-inner"${bellTextStyle}>
                        <span class="period-name">${formatPeriodName(item.name)}${personalLabel}</span>
                        <span class="time-label">${item.start} - ${item.end}</span>
                    </div>
                </div>`;
        }

        block.innerHTML=`${progressHTML}
            <div class="period-content">
                <div class="period-text-base">
                    <span class="period-name">${formatPeriodName(item.name)}${personalLabel}</span>
                    <span class="time-label">${item.start} - ${item.end}</span>
                </div>${fillTextHTML}
            </div>`;
        container.appendChild(block);
    });

    let periodDisplay = "현재 교시: " + activeName;
    if (activePersonal) {
        const personalInfo = [activePersonal.room, activePersonal.name].filter(Boolean).join(' ');
        if (personalInfo) periodDisplay += ' · ' + personalInfo;
    }
    document.getElementById("currentPeriod").textContent = periodDisplay;

    const workStart=toMinutes("08:20"), commuteStart=toMinutes("06:00");
    const leaveBlock=todaySchedule.find(i=>i.name==="수업 끝^-^");
    const leaveStart=leaveBlock?toMinutes(leaveBlock.start):toMinutes("15:30");
    const leaveEndSec=16*3600+20*60;
    const nextItem=todaySchedule.find(i=>toMinutes(i.start)>currentMinutes&&!i.no_countdown);

    let nextTimerText;
    if (currentMinutes>=commuteStart&&currentMinutes<workStart) {
        const commuteLeftMs = workStart*60000 - currentMs;
        nextTimerText = formatCountdown(commuteLeftMs, '출근까지') + ' 남음';
    } else if (leaveBlock&&currentMinutes>=leaveStart&&currentMinutes<toMinutes("16:20")) {
        const leftMs = leaveEndSec*1000 - currentMs;
        nextTimerText = formatCountdown(leftMs, '정시퇴근까지', alwaysMs);
    } else if (nextItem) {
        nextTimerText=`${nextItem.name}까지 ${toMinutes(nextItem.start)-currentMinutes}분 남음`;
    } else if (activeScheduleItem && !activeScheduleItem.no_countdown) {
        const aEMin = toMinutes(activeScheduleItem.end), aSMin = toMinutes(activeScheduleItem.start);
        let endMs = aEMin * 60000;
        if (aEMin <= aSMin && currentMs > endMs) endMs += 86400000;
        nextTimerText = formatCountdown(endMs - currentMs, `${activeScheduleItem.name} 종료까지`);
    } else {
        const leftToLeaveMs = leaveEndSec * 1000 - currentMs;
        if (leftToLeaveMs > 0 && currentMs >= workStart * 60000) {
            nextTimerText = formatCountdown(leftToLeaveMs, '정시퇴근까지', alwaysMs);
        } else {
            nextTimerText = endText;
        }
    }
    document.getElementById("nextTimer").textContent=nextTimerText;

    let miniTimerText;
    if (miniActiveItem) {
        const aEMin2 = toMinutes(miniActiveItem.end), aSMin2 = toMinutes(miniActiveItem.start);
        let endMs2 = aEMin2 * 60000;
        if (aEMin2 <= aSMin2 && currentMs > endMs2) endMs2 += 86400000;
        miniTimerText = formatCountdown(endMs2 - currentMs, `${miniActiveItem.name} 종료까지`);
    } else if (nextItem) {
        const nextStartMs = toMinutes(nextItem.start) * 60000;
        miniTimerText = formatCountdown(nextStartMs - currentMs, '쉬는 시간 종료까지');
    } else {
        const leftToLeaveMs = leaveEndSec * 1000 - currentMs;
        if (leftToLeaveMs > 0 && currentMs >= workStart * 60000) {
            miniTimerText = formatCountdown(leftToLeaveMs, '정시퇴근까지', alwaysMs);
        } else {
            miniTimerText = "오늘 일정 종료";
        }
    }
    document.getElementById("miniTimer").textContent = miniTimerText;

    if (isMiniMode && !container.querySelector('.period-block.active:not(.no-countdown)')) {
        const withinHours = currentTime >= "08:20" && currentTime < "16:20";
        addMiniInactiveBlock(container, withinHours && nextItem ? "쉬는 시간" : activeName);
    }
}

async function init() {
    await loadSchedule();
    buildTopBar();
    const savedOpacity = scheduleData.opacity ?? 100;
    document.getElementById('opacitySlider').value = savedOpacity;
    applyOpacity(savedOpacity);
    if (scheduleData.has_bg) {
        document.body.classList.add('has-bg');
        document.getElementById('bgBtn').classList.add('pinned');
    }
    applyTheme();
    scheduleRender();
}

function scheduleRender() {
    render();
    setTimeout(scheduleRender, Date.now() < _fastRenderUntil ? 50 : 1000);
}

function startResize(e, direction) {
    e.preventDefault();
    e.stopPropagation();
    if (window.pywebview && window.pywebview.api && window.pywebview.api.start_resize) {
        window.pywebview.api.start_resize(direction);
    }
}

window.addEventListener('pywebviewready', init);

// Ctrl(Windows) / Cmd(Mac) + 스크롤로 글자 크기 조절
let _fontScaleSaveTimer = null;
document.addEventListener('wheel', function(e) {
    const isMac = navigator.platform.startsWith('Mac');
    if (!(isMac ? e.metaKey : e.ctrlKey) || !scheduleData) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    const next = Math.round(Math.max(0.5, Math.min(2.0, (scheduleData.font_scale || 1.0) + delta)) * 10) / 10;
    if (next === scheduleData.font_scale) return;
    scheduleData.font_scale = next;
    applyFontScale(next);
    clearTimeout(_fontScaleSaveTimer);
    _fontScaleSaveTimer = setTimeout(() => window.pywebview.api.save_schedule(scheduleData), 500);
}, { passive: false });
</script>
<div class="resize-handle top"          onmousedown="startResize(event,'top')"></div>
<div class="resize-handle bottom"       onmousedown="startResize(event,'bottom')"></div>
<div class="resize-handle left"         onmousedown="startResize(event,'left')"></div>
<div class="resize-handle right"        onmousedown="startResize(event,'right')"></div>
<div class="resize-handle top-left"     onmousedown="startResize(event,'top-left')"></div>
<div class="resize-handle top-right"    onmousedown="startResize(event,'top-right')"></div>
<div class="resize-handle bottom-left"  onmousedown="startResize(event,'bottom-left')"></div>
<div class="resize-handle bottom-right" onmousedown="startResize(event,'bottom-right')"></div>
</body>
