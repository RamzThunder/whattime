name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v1.9.2, v2.0.0 등 태그 push 시 릴리즈 생성
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview bottle

      - name: Build .app with PyInstaller
        run: |
          pyinstaller whattime_app_mac.spec

      - name: Create DMG
        run: |
          hdiutil create -volname "WhatTime" -srcfolder dist/whattime_app_mac.app -ov -format UDZO dist/WhatTime-mac.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatTime-mac
          path: dist/WhatTime-mac.dmg

  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview bottle

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller whattime_app_win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatTime-win
          path: dist/WhatTime.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatTime-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatTime-win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: RamzThunder/whattime-releases
          token: ${{ secrets.releases_pat }}
          files: |
            WhatTime-mac.dmg
            WhatTime.exe
          generate_release_notes: true
