name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v1.9.2, v2.0.0 등 태그 push 시 릴리즈 생성
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview bottle pillow certifi

      - name: Build .app with PyInstaller
        run: |
          pyinstaller whattime_app_mac.spec

      - name: Create DMG
        run: |
          brew install create-dmg
          python3 make_dmg_bg.py
          mkdir -p /tmp/dmg_staging
          cp -R "dist/지금 몇교시야.app" /tmp/dmg_staging/
          cp install.command /tmp/dmg_staging/
          chmod +x /tmp/dmg_staging/install.command
          create-dmg \
            --volname "지금 몇교시야" \
            --background "dmg_background.png" \
            --window-pos 200 100 \
            --window-size 560 300 \
            --icon-size 128 \
            --icon "지금 몇교시야.app" 140 150 \
            --app-drop-link 420 150 \
            --icon "install.command" 280 260 \
            dist/WhatTime-mac.dmg \
            /tmp/dmg_staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatTime-mac
          path: dist/WhatTime-mac.dmg

  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywebview bottle pillow certifi

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller whattime_app_win.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatTime-win
          path: dist/whattime.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatTime-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatTime-win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: RamzThunder/whattime-releases
          token: ${{ secrets.releases_pat }}
          files: |
            WhatTime-mac.dmg
            whattime.exe
          generate_release_notes: true
